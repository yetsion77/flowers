<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>זיכרון פורח - פרחי וציפורי ארץ ישראל</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="background-animation"></div>

    <!-- מסך בחירה -->
    <div id="start-screen" class="start-screen">
        <div class="start-content glass">
            <h1 class="start-title">🌿 זיכרון פורח</h1>
            <p class="start-subtitle">בחרו קטגוריה ותתחילו לשחק!</p>
            <div class="category-buttons">
                <button class="category-btn flowers-btn" id="btn-flowers">
                    <span class="category-emoji">🌸</span>
                    <span class="category-name">פרחי ארץ ישראל</span>
                    <span class="category-desc">כלנית, רקפת, אירוס ועוד...</span>
                </button>
                <button class="category-btn birds-btn" id="btn-birds">
                    <span class="category-emoji">🦅</span>
                    <span class="category-name">ציפורי ארץ ישראל</span>
                    <span class="category-desc">דוכיפת, בז, נשר ועוד...</span>
                </button>
            </div>
        </div>
    </div>

    <!-- מסך המשחק -->
    <div id="game-screen" class="game-screen hidden">
        <header>
            <button id="back-btn" class="back-btn" title="חזרה לתפריט">← תפריט</button>
            <h1 id="game-title">זיכרון פורח</h1>
            <p id="game-subtitle">גלו את פרחי ארץ ישראל</p>
            <div class="game-stats">
                <div class="stat-box">
                    <span class="label">זמן</span>
                    <span id="timer" class="value">00:00</span>
                </div>
                <div class="stat-box">
                    <span class="label">ניסיונות</span>
                    <span id="moves" class="value">0</span>
                </div>
                <button id="restart-btn" class="restart-btn" title="התחל מחדש">↻</button>
            </div>
        </header>

        <main>
            <div class="game-container" id="game-board">
                <!-- Cards will be generated here -->
            </div>
        </main>
    </div>

    <!-- Modal for Victory -->
    <div id="victory-modal" class="modal hidden">
        <div class="modal-content glass">
            <h2 id="victory-title">כל הכבוד! 🌸</h2>
            <p>מצאתם את כל הזוגות!</p>
            <div class="final-stats">
                <p>זמן: <span id="final-time"></span></p>
                <p>צעדים: <span id="final-moves"></span></p>
            </div>
            <div class="modal-btns">
                <button id="play-again-btn" class="primary-btn">שחק שוב</button>
                <button id="back-to-menu-btn" class="secondary-btn">תפריט ראשי</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
